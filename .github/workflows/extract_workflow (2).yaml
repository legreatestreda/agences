name: Extract and Analyze HTML from Google Drive ZIPs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Exécution quotidienne à minuit (optionnel)

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install beautifulsoup4 requests

      - name: Download ZIPs from Google Drive
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
        run: |
          python download_from_drive.py

      - name: Run extraction and analysis
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
        run: |
          # On vérifie si des ZIP ont été téléchargés avant de lancer l'analyse
          if ls *.zip 1> /dev/null 2>&1; then
            python extract_and_analyze.py
          else
            echo "Aucun fichier ZIP à analyser."
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: extraction-results
          path: extraction_results.json
