name: Scraper Agences

on:
  schedule:
    - cron: '0 */6 * * *'   # toutes les 6h
  workflow_dispatch:          # lancement manuel aussi

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 340      # 5h40 max (marge avant la limite de 6h)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dépendances
        run: pip install requests google-api-python-client google-auth

      - name: Lancer le scraper
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python scraper_agences_enrichi_drive.py
        
      - name: Commit progress + résultats
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progress_scraper.json agences_scrappees.csv agences_echecs.csv || true
          git diff --staged --quiet || git commit -m "scraper: progression $(date +'%Y-%m-%d %H:%M')"
          git push
