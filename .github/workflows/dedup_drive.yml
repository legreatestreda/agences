name: Dedup Drive

on:
  workflow_dispatch:   # lancement manuel uniquement
    inputs:
      dry_run:
        description: "Dry-run (liste + trie sans supprimer). Décocher pour supprimer réellement."
        type: boolean
        default: true

jobs:
  dedup:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dépendances
        run: pip install google-api-python-client google-auth

      - name: Lancer la déduplication
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: python dedup_drive.py

      - name: Commit rapport
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rapport_dedup.csv || true
          git diff --staged --quiet || git commit -m "dedup: rapport $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase --autostash
          git push
