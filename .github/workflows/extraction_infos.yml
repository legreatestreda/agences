name: Extraction Infos Agences

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'   # toutes les 5h (en dessous du timeout de 5h40)

concurrency:
  group: extraction-infos
  cancel-in-progress: false

jobs:
  extraire:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dépendances
        run: pip install openai google-api-python-client google-auth beautifulsoup4

      - name: Lancer l'extraction
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
        run: python extraire_infos_drive.py

      - name: Commit résultats
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extraction_resultats.csv extraction_progress.json || true
          git diff --staged --quiet || git commit -m "extraction: progression $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase --autostash
          git push
