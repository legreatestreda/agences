name: Extract and Analyze HTML from Google Drive ZIPs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'   # toutes les 2h (40 zips ~1h max)

concurrency:
  group: extraction-agences
  cancel-in-progress: false  # le suivant attend, ne coupe pas

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120     # 2h max par run

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main           # toujours la version la plus récente (progress.json à jour)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install beautifulsoup4 requests

      - name: Download next 40 ZIPs from Google Drive
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python download_from_drive.py

      - name: Run extraction and analysis
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
        run: |
          if ls *.zip 1> /dev/null 2>&1; then
            python extract_and_analyze.py
          else
            echo "Aucun ZIP à analyser, tous les zips ont été traités."
          fi

      - name: Commit progress + résultats
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progress.json extraction_results.json || true
          git diff --staged --quiet || git commit -m "extraction: batch $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase --autostash
          git push
